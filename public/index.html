<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EcoLogix.AI — Unified Operations Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:         #060d09;
      --surface:    #0c1810;
      --surface2:   #101f14;
      --border:     #1a3020;
      --border2:    #254030;
      --green:      #00e87a;
      --green2:     #00b55e;
      --green-dim:  rgba(0,232,122,0.07);
      --green-glow: rgba(0,232,122,0.22);
      --amber:      #f5a623;
      --red:        #ff4d6a;
      --blue:       #4db8ff;
      --text:       #e2f0e8;
      --text2:      #7aaa8a;
      --text3:      #4a6a55;
      --mono:       'DM Mono', monospace;
      --sans:       'DM Sans', sans-serif;
      --display:    'Bebas Neue', sans-serif;
      --bar:        60px;
      --tabs:       50px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }

    /* noise */
    body::before {
      content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity:0.45;
    }
    /* grid */
    body::after {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image: linear-gradient(rgba(0,232,122,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(0,232,122,0.022) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── TOPBAR ── */
    .topbar {
      position:relative; z-index:100;
      height: var(--bar);
      background: rgba(6,13,9,0.96);
      backdrop-filter: blur(28px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 24px; gap: 18px;
    }
    .logo-wrap { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .logo-mark {
      width:34px; height:34px;
      background: linear-gradient(135deg, var(--green), #00c870);
      border-radius:9px;
      display:flex; align-items:center; justify-content:center;
      font-size:17px;
      box-shadow: 0 0 18px var(--green-glow);
      flex-shrink:0;
    }
    .logo-title { font-family:var(--display); font-size:21px; letter-spacing:0.04em; line-height:1; }
    .logo-title span { color:var(--green); }
    .logo-sub { font-family:var(--mono); font-size:9px; letter-spacing:0.14em; color:var(--text3); text-transform:uppercase; margin-top:2px; }

    .sep { width:1px; height:28px; background:var(--border2); flex-shrink:0; }

    /* status pills */
    .pills { display:flex; gap:7px; flex:1; flex-wrap:wrap; }
    .pill {
      display:flex; align-items:center; gap:5px;
      padding: 3px 9px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px;
      font-family:var(--mono); font-size:9.5px; color:var(--text2);
    }
    .dot { width:5px; height:5px; border-radius:50%; }
    .dot-g { background:var(--green); box-shadow:0 0 5px var(--green); animation:blink 2s infinite; }
    .dot-a { background:var(--amber); box-shadow:0 0 5px var(--amber); animation:blink 2.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

    .topbar-r { display:flex; align-items:center; gap:12px; margin-left:auto; flex-shrink:0; }
    .clock { font-family:var(--mono); font-size:13px; color:var(--green); letter-spacing:0.1em; }
    .live-badge {
      font-family:var(--mono); font-size:9px; letter-spacing:0.15em; text-transform:uppercase;
      padding:3px 8px;
      background:var(--green-dim); border:1px solid var(--green2);
      border-radius:4px; color:var(--green);
    }

    /* ── TAB BAR ── */
    .tabbar {
      position:relative; z-index:99;
      height: var(--tabs);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: stretch;
      padding: 0 24px; gap: 2px;
    }
    .tab {
      position:relative;
      display:flex; align-items:center; gap:7px;
      padding: 0 18px;
      background:none; border:none; cursor:pointer;
      font-family:var(--mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase;
      color:var(--text3); transition:color 0.2s;
      white-space:nowrap;
    }
    .tab:hover { color:var(--text2); }
    .tab.active { color:var(--green); }
    .tab.active::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
      background:var(--green); box-shadow:0 0 8px var(--green-glow);
      border-radius:2px 2px 0 0;
    }
    .tab-icon { font-size:13px; }
    .tab-badge {
      padding:1px 5px; border-radius:10px;
      background:var(--green-dim); border:1px solid rgba(0,232,122,0.18);
      font-size:8.5px; color:var(--green);
    }
    .tabbar-right {
      margin-left:auto; display:flex; align-items:center;
      font-family:var(--mono); font-size:9px; letter-spacing:0.12em;
      color:var(--text3);
    }

    /* ── FRAMES ── */
    .frames {
      position:relative; z-index:1;
      height: calc(100vh - var(--bar) - var(--tabs));
    }
    .pane {
      position:absolute; inset:0;
      opacity:0; pointer-events:none;
      transition:opacity 0.22s ease;
    }
    .pane.active { opacity:1; pointer-events:auto; }
    .pane iframe { width:100%; height:100%; border:none; display:block; background:var(--bg); }

    /* ── LOADING ── */
    .loader {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
      background:var(--bg); z-index:10;
      transition:opacity 0.35s ease;
    }
    .loader.gone { opacity:0; pointer-events:none; }
    .spinner {
      width:36px; height:36px;
      border:2px solid var(--border2); border-top-color:var(--green);
      border-radius:50%; animation:spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loader-label { font-family:var(--mono); font-size:10px; letter-spacing:0.14em; color:var(--text3); text-transform:uppercase; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo-mark">🌿</div>
      <div>
        <div class="logo-title">EcoLogix<span>.AI</span></div>
        <div class="logo-sub">Unified Operations Platform</div>
      </div>
    </div>

    <div class="sep"></div>

    <div class="pills">
      <div class="pill"><div class="dot dot-g"></div>Dashboard API</div>
      <div class="pill"><div class="dot dot-g"></div>Eco-Routing</div>
      <div class="pill"><div class="dot dot-g"></div>Backhauling</div>
      <div class="pill"><div class="dot dot-a"></div>SMS Gateway</div>
    </div>

    <div class="topbar-r">
      <div class="clock" id="clk">--:--:--</div>
      <div class="live-badge">● LIVE</div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tabbar">
    <button class="tab active" data-tab="dashboard"   onclick="go('dashboard')">
      <span class="tab-icon">📊</span>Dashboard<span class="tab-badge">Live</span>
    </button>
    <button class="tab"        data-tab="ecorouting"  onclick="go('ecorouting')">
      <span class="tab-icon">🗺️</span>Eco-Routing
    </button>
    <button class="tab"        data-tab="backhauling" onclick="go('backhauling')">
      <span class="tab-icon">🔄</span>Backhauling
    </button>
    <button class="tab"        data-tab="sms"         onclick="go('sms')">
      <span class="tab-icon">📡</span>SMS Assistant
    </button>
    <div class="tabbar-right">localhost:4000 · Unified Gateway</div>
  </div>

  <!-- IFRAME PANES -->
  <div class="frames">

    <div class="pane active" id="pane-dashboard">
      <div class="loader" id="load-dashboard">
        <div class="spinner"></div>
        <div class="loader-label">Loading Dashboard</div>
      </div>
      <iframe src="/dashboard/index.html" title="Dashboard"   onload="loaded('dashboard')"></iframe>
    </div>

    <div class="pane" id="pane-ecorouting">
      <div class="loader" id="load-ecorouting">
        <div class="spinner"></div>
        <div class="loader-label">Loading Eco-Routing</div>
      </div>
      <iframe src="/ecorouting/index.html" title="Eco-Routing" onload="loaded('ecorouting')"></iframe>
    </div>

    <div class="pane" id="pane-backhauling">
      <div class="loader" id="load-backhauling">
        <div class="spinner"></div>
        <div class="loader-label">Loading Backhauling</div>
      </div>
      <iframe src="/backhauling/index.html" title="Backhauling" onload="loaded('backhauling')"></iframe>
    </div>

    <div class="pane" id="pane-sms">
      <div class="loader" id="load-sms">
        <div class="spinner"></div>
        <div class="loader-label">Loading SMS Assistant</div>
      </div>
      <iframe src="/sms/index.html" title="SMS Assistant" onload="loaded('sms')"></iframe>
    </div>

  </div>

  <script>
    var cur = 'dashboard';

    function go(name) {
      if (name === cur) return;
      document.querySelectorAll('.tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.tab === name);
      });
      document.querySelectorAll('.pane').forEach(function(p) {
        p.classList.toggle('active', p.id === 'pane-' + name);
      });
      cur = name;
    }

    function loaded(name) {
      var el = document.getElementById('load-' + name);
      if (el) setTimeout(function() { el.classList.add('gone'); }, 250);
    }

    // Clock
    (function tick() {
      var n = new Date(), p = function(x){return String(x).padStart(2,'0');};
      document.getElementById('clk').textContent = p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
      setTimeout(tick, 1000);
    })();
  </script>

</body>
</html>
